<html lang="en">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">

  <style>
    #map {
      height: 450px;
      width: 100%;
    }
  </style>
</head>
<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
  <div class="container">
    <a class="navbar-brand" href="index.html">🚇 Find My Metro</a>
    <div class="collapse navbar-collapse">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
        <li class="nav-item"><a class="nav-link" href="about.html">About</a></li>
        <li class="nav-item"><a class="nav-link" href="find-metro.html">Find Metro</a></li>

        <li class="nav-item"><a class="nav-link" href="signup.html">Sign Up</a></li>
      </ul>
    </div>
  </div>
</nav>

<!-- MAP SECTION -->
<section class="py-5">
  <div class="container text-center">
    <h2>Find Nearest Metro Station</h2>
    <button class="btn btn-primary my-3" onclick="getLocation()">📍 Find My Metro</button>
    <div id="map"></div>
  </div>
</section>

<!-- FOOTER -->
<footer class="bg-primary text-light text-center py-3">
  <p class="mb-0">© 2026 Find My Metro</p>
</footer>

<!-- JS -->
<script>
function getLocation() {
  if (navigator.geolocation) {
    navigator.geolocation.getCurrentPosition(showMap);
  } else {
    alert("Geolocation not supported");
  }
}

function showMap(position) {
  const userLocation = {
    lat: position.coords.latitude,
    lng: position.coords.longitude
  };

  const map = new google.maps.Map(document.getElementById("map"), {
    center: userLocation,
    zoom: 14
  });

  new google.maps.Marker({
    position: userLocation,
    map: map,
    title: "Your Location"
  });

  const service = new google.maps.places.PlacesService(map);
  service.nearbySearch({
    location: userLocation,
    radius: 3000,
    keyword: "metro station"
  }, (results, status) => {
    if (status === google.maps.places.PlacesServiceStatus.OK) {
      results.forEach(place => {
        new google.maps.Marker({
          map: map,
          position: place.geometry.location,
          title: place.name
        });
      });
    }
  });
}
</script>

<script async
  src="https://maps.googleapis.com/maps/api/js?key=YOUR_API_KEY&libraries=places">
</script>

</body>
</html>
